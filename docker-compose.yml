version: '3.9'

services:
  # --- Frontend (React Vite serving Nginx in production, or Node dev server) ---
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://backend:3001
      - VITE_WS_URL=ws://backend:3001
    depends_on:
      - backend

  # --- Backend (Node Express Server) ---
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - neo4j
    volumes:
      - ./packages/backend/src:/app/src

  # --- AI Microservices (Python FastAPI) ---
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WORKERS=4
    depends_on:
      - mongodb
      - redis
      - qdrant
      - neo4j
    volumes:
      - ./ai-services:/app

  # --- Ingestion Worker (Python BullMQ job consumer) ---
  ingestion-worker:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    command: python -m services.ingestion.worker
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
      - ai-services
    deploy:
      replicas: 2
    volumes:
      - ./ai-services:/app

  # --- MongoDB Atlas Local Dev ---
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ikip_production

  # --- Redis ---
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Neo4j Graph Database ---
  neo4j:
    image: neo4j:5.23
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  # --- Qdrant Vector Search DB ---
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # --- Monitoring (Prometheus & Grafana) ---
  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3002:3000"
    depends_on:
      - prometheus

volumes:
  mongo_data:
  redis_data:
  neo4j_data:
  qdrant_data:
